<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retail Banking Value Chain Mapper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Retail Banking L1 × L2 Value Chain Matrix</h1>
      <p>
        Columns are value-chain L1 stages. Each cell now contains multiple L2 blocks,
        each with activity count and unit-summary dots. Single-click any L2 block for
        activity-level drill-down.
      </p>
    </header>

    <section class="controls">
      <div class="control-title">Filter / Highlight by Unit or Channel</div>
      <div id="unitFilters" class="chip-wrap"></div>
      <button id="clearFilter" class="clear-btn">Clear</button>
    </section>

    <main>
      <div class="table-wrap">
        <table id="matrix"></table>
      </div>
      <div id="selectionInfo" class="selection-info"></div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
