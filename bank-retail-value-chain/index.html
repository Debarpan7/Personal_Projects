<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retail Banking Value Chain Mapper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Retail Banking L1 × L2 Matrix</h1>
      <p>
        Optimized matrix with configurable model. Edit mode lets you change products,
        stages, L2s, units and activities (via JSON editor + detail editor).
      </p>
    </header>

    <section class="controls">
      <div class="control-row">
        <button id="editToggle" class="clear-btn">Enter Edit Mode</button>
        <button id="saveConfigBtn" class="clear-btn">Save JSON</button>
        <button id="resetConfigBtn" class="clear-btn">Reset</button>
        <button id="downloadConfigBtn" class="clear-btn">Download JSON</button>
      </div>
      <div id="statusLine" class="selection-info"></div>
      <div class="control-title">Filter by Unit</div>
      <div id="unitFilters" class="chip-wrap"></div>
      <button id="clearFilter" class="clear-btn">Clear Filter</button>
    </section>

    <main>
      <div class="table-wrap">
        <table id="matrix"></table>
      </div>
      <div id="selectionInfo" class="selection-info"></div>

      <section class="controls">
        <div class="control-title">Full Configuration JSON (Add / Edit / Remove Everything)</div>
        <textarea id="configEditor" class="config-editor"></textarea>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
